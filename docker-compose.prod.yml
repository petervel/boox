services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: bookshelf
      MYSQL_USER: bookshelf
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - web

  books-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_USER: bookshelf
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: bookshelf
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy
    networks:
      - web

  books-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    networks:
      - web
    volumes:
      - frontend-build:/usr/share/nginx/html

volumes:
  mysql_data_prod:
  frontend-build:

networks:
  web:
    external: true